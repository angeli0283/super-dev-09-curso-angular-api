<label for="nome">Nome</label>
<input type="text" [(ngModel)]="projeto().nome"
    id="nome" placeholder="Escreva o nome do projeto">

<label for="codigo">código</label>
<input type="text" [(ngModel)]="projeto().codigo"
    id="codigo" placeholder="Digite o codigo do projeto">

<label for="custo">Custo Estimado</label>
<input type="number" [(ngModel)]="projeto().custo"
    id="custo" placeholder="Digite o custo estimado do projeto">

<button (click)="salvar()">Salvar</button>
